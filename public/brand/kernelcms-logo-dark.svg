<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 116" role="img" aria-labelledby="t d" fill="none">
  <title id="t">KernelCMS</title>
  <desc id="d">A radiant star mark beside the KernelCMS wordmark (light variant for dark backgrounds).</desc>

  <defs>
    <linearGradient id="kernelMarkDark" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fafafa" />
      <stop offset="0.5" stop-color="#9a9aa6" />
      <stop offset="1" stop-color="#fafafa" />
    </linearGradient>
  </defs>

  <!-- Radiant star mark -->
  <g transform="translate(9 16) scale(0.84)">
    <path
      d="M50 0 L53 34 L68 3 L55 36 L90 12 L58 40 L98 38 L59 46 L100 50 L59 55 L96 68 L57 58 L88 90 L54 62 L65 98 L51 64 L50 100 L48 62 L32 96 L45 60 L8 85 L42 56 L2 65 L41 52 L0 50 L42 46 L4 35 L44 42 L12 14 L46 38 L35 5 L48 36 Z"
      fill="url(#kernelMarkDark)"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="120"
    y="76"
    font-family="'Jost','Century Gothic','Futura','Avenir Next','Segoe UI',sans-serif"
    font-size="58"
    letter-spacing="1"
    fill="#fafafa"
  >
    <tspan font-weight="300">Kernel</tspan><tspan font-weight="500">CMS</tspan>
  </text>
</svg>
