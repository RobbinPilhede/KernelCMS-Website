<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KernelCMS: Headless CMS & Backend for AI-Generated Sites</title>
    <meta
      name="description"
      content="Add a backend and CMS to any site, including AI-generated ones. KernelCMS is an open-source TypeScript headless CMS with REST + GraphQL and no lock-in."
    />
    <meta name="theme-color" content="#131316" />
    <meta
      name="keywords"
      content="KernelCMS, headless CMS, open source CMS, TypeScript CMS, self-hosted CMS, Node.js CMS, config-as-code CMS, backend for AI-generated sites, agent-native CMS"
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="KernelCMS" />
    <link rel="canonical" href="https://kernelcms.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KernelCMS" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="KernelCMS: Headless CMS & Backend for AI-Generated Sites" />
    <meta
      property="og:description"
      content="Add a backend and CMS to any site, including AI-generated ones. KernelCMS is an open-source TypeScript headless CMS with REST + GraphQL and no lock-in."
    />
    <meta property="og:url" content="https://kernelcms.com/" />
    <meta property="og:image" content="https://kernelcms.com/og/default.png" />
    <meta property="og:image:alt" content="KernelCMS - the headless CMS and backend for any site, including AI-generated ones" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kernelcms" />
    <meta name="twitter:creator" content="@kernelcms" />
    <meta name="twitter:title" content="KernelCMS: Headless CMS & Backend for AI-Generated Sites" />
    <meta
      name="twitter:description"
      content="Add a backend and CMS to any site, including AI-generated ones. KernelCMS is an open-source TypeScript headless CMS with REST + GraphQL and no lock-in."
    />
    <meta name="twitter:image" content="https://kernelcms.com/og/default.png" />
    <meta name="twitter:image:alt" content="KernelCMS - the headless CMS and backend for any site, including AI-generated ones" />

    <link rel="icon" href="/brand/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/kernelcms-icon.svg" />
    <link rel="alternate" type="text/markdown" href="/llms.txt" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Sitewide structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://kernelcms.com/#organization",
            "name": "KernelCMS",
            "url": "https://kernelcms.com/",
            "logo": "https://kernelcms.com/brand/kernelcms-icon.svg",
            "sameAs": ["https://github.com/RobbinPilhede/KernelCMS"]
          },
          {
            "@type": "WebSite",
            "@id": "https://kernelcms.com/#website",
            "name": "KernelCMS",
            "url": "https://kernelcms.com/",
            "publisher": { "@id": "https://kernelcms.com/#organization" },
            "inLanguage": "en"
          }
        ]
      }
    </script>
    <script>
      (function () {
        try {
          if (localStorage.getItem('kernel-theme') !== 'light') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
